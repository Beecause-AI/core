services:
  firestore:
    image: google/cloud-sdk:emulators
    command: >
      gcloud emulators firestore start
      --host-port=0.0.0.0:8080 --database-mode=firestore-native
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
  mailpit:
    image: axllent/mailpit:v1.30.1
    ports: ["8025:8025"]
