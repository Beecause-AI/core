services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beecause
      POSTGRES_PASSWORD: beecause
      POSTGRES_DB: beecause
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beecause"]
      interval: 2s
      timeout: 3s
      retries: 20
